spring:
  application:
    name: backend-bot

  datasource:
    password: cbr-monitoring
    username: cbr-monitoring
    url: jdbc:postgresql://localhost:5423/cbr-monitoring
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
      show-sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  main:
    banner-mode: off

  cloud.openfeign.client.config:
    cbr-api:
      url: https://www.cbr-xml-daily.ru
      logger-level: full
      connect-timeout: 200
      read-timeout: 30000

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 100
        permittedNumberOfCallsInHalfOpenState: 10
        slowCallDurationThreshold: 4s
        slowCallRateThreshold: 10
        failureRateThreshold: 30
        waitDurationInOpenState: 1s
        minimumNumberOfCalls: 20
    instances:
      cbr-api:
        baseConfig: default

  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 100ms
        retryExceptions:
          - org.springframework.web.client.HttpServerErrorException
          - java.util.concurrent.TimeoutException
          - java.io.IOException
    instances:
      cbr-api:
        base-config: default

  rateLimiter:
    configs:
      default:
        timeoutDuration: 5s
        limitForPeriod: 10
        limit-refresh-period: 1s
    instances:
      cbr-api:
        base-config: default

cbr-api:
  url: https://www.cbr-xml-daily.ru

server:
  port: 8090
